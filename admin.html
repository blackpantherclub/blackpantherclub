<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Black Panther Club</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #04030a;
      --gold: #c9952a;
      --gold-light: #e8b84b;
      --violet: #3b00cc;
      --text: #e8e0d0;
      --text-dim: #8a8070;
      --card: #0d0b18;
      --border: #2a2040;
      --error: #e74c3c;
      --success: #2ecc71;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
    }

    /* LOGIN */
    .login-container {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #0d0b18 0%, #04030a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--gold);
      padding: 50px 40px;
      width: 380px;
      text-align: center;
    }

    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      filter: drop-shadow(0 0 20px rgba(201,149,42,0.5));
    }

    .login-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .login-sub {
      color: var(--text-dim);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 35px;
    }

    .login-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 16px;
      transition: border-color 0.3s;
    }

    .login-input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none;
      border-radius: 4px;
      padding: 14px;
      color: #04030a;
      font-family: 'Bebas Neue', cursive;
      font-size: 18px;
      letter-spacing: 4px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-weight: bold;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201,149,42,0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-error {
      color: var(--error);
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* ADMIN PANEL */
    .admin-container {
      display: none;
    }

    .admin-container.show {
      display: block;
    }

    header {
      background: linear-gradient(180deg, #0d0b18 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 0 10px rgba(201,149,42,0.4));
    }

    .header-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: 3px;
    }

    .header-badge {
      background: var(--violet);
      color: white;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      padding: 8px 20px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
      border-radius: 4px;
    }

    .logout-btn:hover {
      border-color: var(--error);
      color: var(--error);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 42px;
      color: var(--gold);
      letter-spacing: 6px;
      margin-bottom: 8px;
    }

    .page-sub {
      color: var(--text-dim);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      font-family: 'Bebas Neue', cursive;
      font-size: 18px;
      letter-spacing: 3px;
      color: var(--text-dim);
      padding: 12px 28px;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .upload-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 30px;
    }

    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 22px;
      color: var(--gold-light);
      letter-spacing: 3px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-group {
      flex: 1;
      min-width: 200px;
      margin-bottom: 20px;
    }

    .input-label {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--gold);
    }

    .upload-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      color: #04030a;
      font-family: 'Bebas Neue', cursive;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-weight: bold;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(201,149,42,0.3);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .group-card {
      border: 1px solid rgba(201,149,42,0.2);
      border-radius: 8px;
      overflow: hidden;
    }

    .group-image {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, rgba(59,0,204,0.1) 0%, rgba(0,0,0,0.3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .group-image img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(201,149,42,0.3));
    }

    .group-info {
      padding: 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(8,5,20,0.6) 0%, rgba(4,3,10,0.9) 100%);
    }

    .group-name {
      font-family: 'Bebas Neue', cursive;
      font-size: 16px;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .group-subtitle {
      font-size: 12px;
      letter-spacing: 1px;
      color: rgba(232,232,240,0.6);
    }

    .group-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .group-item {
      background: rgba(201,149,42,0.1);
      border: 1px solid rgba(201,149,42,0.2);
      padding: 15px;
      border-radius: 4px;
    }

    .group-item h4 {
      color: var(--gold);
      margin-bottom: 8px;
    }

    .group-item p {
      color: var(--text-dim);
      font-size: 12px;
      margin-bottom: 12px;
    }

    .delete-btn {
      background: var(--error);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
    }

    .delete-btn:hover {
      opacity: 0.8;
    }

    #toast {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px 25px;
      color: var(--text);
      font-size: 13px;
      z-index: 999;
      transition: bottom 0.3s;
    }

    #toast.show {
      bottom: 20px;
    }

    #toast.success {
      border-color: var(--success);
      color: var(--success);
    }

    #toast.error {
      border-color: var(--error);
      color: var(--error);
    }

    .empty-message {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-container" id="loginContainer">
    <div class="login-box">
      <img src="favicon.png" alt="BPC" class="login-logo">
      <h2 class="login-title">BLACK PANTHER</h2>
      <p class="login-sub">Admin Panel</p>
      <input id="passInput" type="password" class="login-input" placeholder="PASSWORD" onkeypress="if(event.key==='Enter') doLogin()">
      <button class="login-btn" onclick="doLogin()">ACCEDI</button>
      <p class="login-error" id="loginError">Password non valida</p>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-container" id="adminContainer">
    <header>
      <div class="header-brand">
        <img src="favicon.png" alt="BPC" class="header-logo">
        <div>
          <div class="header-title">BLACK PANTHER</div>
          <div class="header-badge">ADMIN</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">🚪 LOGOUT</button>
    </header>

    <main>
      <h1 class="page-title">ADMIN PANEL</h1>
      <p class="page-sub">Gestisci i gruppi di danza</p>

      <div class="tabs">
        <button class="tab active" onclick="switchTab(event, 'danceTeam')">💃 DANCE TEAM</button>
      </div>

      <!-- DANCE TEAM TAB -->
      <div id="danceTeam" class="tab-content active">
        <div class="upload-section">
          <h3 class="section-title"><span>💃</span>AGGIUNGI GRUPPO</h3>
          
          <div class="input-group">
            <label class="input-label">Nome Gruppo</label>
            <input id="groupNameInput" type="text" class="input-field" placeholder="es. Urban Crew">
          </div>

          <div class="input-group">
            <label class="input-label">Sottotitolo</label>
            <input id="groupSubtitleInput" type="text" class="input-field" value="DANCE GROUP • BLACK PANTHER">
          </div>

          <div class="input-group">
            <label class="input-label">Logo / Immagine</label>
            <input id="groupLogo" type="file" accept="image/*" class="input-field">
            <div id="logoPreview" style="margin-top: 15px;"></div>
          </div>

          <button class="upload-btn" onclick="addDanceGroup()">✅ AGGIUNGI GRUPPO</button>
        </div>

        <h3 class="section-title"><span>👥</span>ANTEPRIMA</h3>
        <div id="previewContainer" class="preview-grid"></div>

        <h3 class="section-title"><span>📝</span>GRUPPI CREATI</h3>
        <div id="danceGroupsList" class="group-list"></div>
      </div>
    </main>
  </div>

  <div id="toast"></div>

  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

  <script>
    // CONFIGURAZIONE FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyA8WyXwKnZHBpIoQfgWSGf7WgtivhoJEDk",
      authDomain: "black-panther-ced90.firebaseapp.com",
      databaseURL: "https://black-panther-ced90-default-rtdb.europe-west1.firebaseio.com",
      projectId: "black-panther-ced90",
      storageBucket: "black-panther-ced90.firebasestorage.app",
      messagingSenderId: "107530122233336",
      appId: "1:107530122233336:web:09d39bf6a6f9784545ea25",
      measurementId: "G-LY0QPYOVPW"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ADMIN_PASSWORD = 'S1m0n3-05-08';
    let currentLogo = null;

    // LOGIN FUNCTIONS
    function doLogin() {
      const pass = document.getElementById('passInput').value;
      console.log('Password inserita:', pass);
      console.log('Password attesa:', ADMIN_PASSWORD);
      console.log('Match:', pass === ADMIN_PASSWORD);

      if (pass === ADMIN_PASSWORD) {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('adminContainer').classList.add('show');
        sessionStorage.setItem('adminLoggedIn', 'true');
        loadGroups();
        showToast('✅ Accesso eseguito!', 'success');
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('passInput').value = '';
        showToast('❌ Password non valida', 'error');
      }
    }

    function doLogout() {
      sessionStorage.removeItem('adminLoggedIn');
      document.getElementById('loginContainer').style.display = 'flex';
      document.getElementById('adminContainer').classList.remove('show');
      document.getElementById('passInput').value = '';
      showToast('👋 Logout eseguito', 'info');
    }

    // CHECK IF ALREADY LOGGED IN
    window.addEventListener('load', () => {
      if (sessionStorage.getItem('adminLoggedIn')) {
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('adminContainer').classList.add('show');
        loadGroups();
      }
    });

    // TAB NAVIGATION
    function switchTab(event, tabName) {
      document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // TOAST NOTIFICATIONS
    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'show ' + type;
      setTimeout(() => { t.className = ''; }, 3500);
    }

    // LOGO UPLOAD
    document.getElementById('groupLogo').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = evt => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          let width = img.width;
          let height = img.height;
          const maxSize = 180;
          
          if (width > height) {
            if (width > maxSize) {
              height = Math.round((height * maxSize) / width);
              width = maxSize;
            }
          } else {
            if (height > maxSize) {
              width = Math.round((width * maxSize) / height);
              height = maxSize;
            }
          }
          
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          currentLogo = canvas.toDataURL('image/png');
          document.getElementById('logoPreview').innerHTML = `<img src="${currentLogo}" style="width: 150px; height: 150px; object-fit: contain; border-radius: 4px; border: 1px solid var(--border);">`;
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    // ADD DANCE GROUP
    function addDanceGroup() {
      const name = document.getElementById('groupNameInput').value.trim();
      
      if (!name) {
        showToast('⚠️ Nome gruppo richiesto!', 'error');
        return;
      }

      const group = {
        name: name,
        subtitle: document.getElementById('groupSubtitleInput').value.trim() || 'DANCE GROUP • BLACK PANTHER',
        logo: currentLogo || null,
        createdAt: new Date().toISOString()
      };

      db.ref('danceGroups').push(group, (error) => {
        if (error) {
          showToast('❌ Errore nel salvataggio: ' + error.message, 'error');
          console.error(error);
        } else {
          document.getElementById('groupNameInput').value = '';
          document.getElementById('groupSubtitleInput').value = 'DANCE GROUP • BLACK PANTHER';
          document.getElementById('groupLogo').value = '';
          document.getElementById('logoPreview').innerHTML = '';
          currentLogo = null;
          loadGroups();
          showToast('✅ Gruppo aggiunto!', 'success');
        }
      });
    }

    // DELETE GROUP
    function deleteGroup(groupId) {
      if (confirm('Elimina questo gruppo?')) {
        db.ref('danceGroups/' + groupId).remove((error) => {
          if (error) {
            showToast('❌ Errore: ' + error.message, 'error');
          } else {
            loadGroups();
            showToast('🗑️ Gruppo eliminato', 'error');
          }
        });
      }
    }

    // LOAD GROUPS FROM FIREBASE
    function loadGroups() {
      db.ref('danceGroups').on('value', (snapshot) => {
        const groups = snapshot.val();
        updatePreview(groups);
      }, (error) => {
        console.error('Errore Firebase:', error);
        showToast('❌ Errore di connessione: ' + error.message, 'error');
      });
    }

    // UPDATE PREVIEW
    function updatePreview(groups) {
      const previewContainer = document.getElementById('previewContainer');
      const listContainer = document.getElementById('danceGroupsList');

      if (!groups || Object.keys(groups).length === 0) {
        previewContainer.innerHTML = '<div class="empty-message" style="grid-column: 1/-1;">Aggiungi il primo gruppo...</div>';
        listContainer.innerHTML = '<div class="empty-message">Nessun gruppo creato</div>';
        return;
      }

      previewContainer.innerHTML = Object.entries(groups).map(([id, g]) => `
        <div class="group-card">
          <div class="group-image">
            ${g.logo ? `<img src="${g.logo}" alt="${g.name}">` : ''}
          </div>
          <div class="group-info">
            <h3 class="group-name">${g.name}</h3>
            <p class="group-subtitle">${g.subtitle}</p>
          </div>
        </div>
      `).join('');

      listContainer.innerHTML = Object.entries(groups).map(([id, g]) => `
        <div class="group-item">
          <h4>${g.name}</h4>
          <p>${g.subtitle}</p>
          ${g.logo ? `<div style="width: 80px; height: 80px; background-image: url('${g.logo}'); background-size: contain; background-repeat: no-repeat; background-position: center; margin-bottom: 12px; border: 1px solid rgba(201,149,42,0.2); border-radius: 3px;"></div>` : ''}
          <button class="delete-btn" onclick="deleteGroup('${id}')">🗑️ ELIMINA</button>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
