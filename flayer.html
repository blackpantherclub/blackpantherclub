  <style>

    :root { --deep:#04030a; --gold:#c9952a; --gold-light:#f0c060; --blue-glow:#3b00cc; --white:#e8e8f0; --panel:rgba(8,5,20,0.88); }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--deep); color:var(--white); font-family:"Rajdhani",sans-serif; overflow-x:hidden; cursor:none; min-height:100vh; }
    #cursor { position:fixed; width:12px; height:12px; background:var(--gold); border-radius:50%; pointer-events:none; z-index:99999; transform:translate(-50%,-50%); mix-blend-mode:difference; }
    #cursor-ring { position:fixed; width:34px; height:34px; border:1.5px solid rgba(201,149,42,.7); border-radius:50%; pointer-events:none; z-index:99998; transform:translate(-50%,-50%); transition:all .1s ease; }
    #canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
    nav { position:fixed; top:0; width:100%; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:16px 48px; background:linear-gradient(to bottom,rgba(4,3,10,.97) 80%,transparent); border-bottom:1px solid rgba(201,149,42,.15); }
    .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .nav-logo img { width:44px; height:44px; object-fit:contain; filter:drop-shadow(0 0 10px rgba(201,149,42,.6)); }
    .nav-logo-text { font-family:"Bebas Neue",sans-serif; font-size:1.6rem; letter-spacing:.2em; color:var(--gold); text-shadow:0 0 20px rgba(201,149,42,.5); }
    .nav-links { display:flex; gap:8px; list-style:none; flex-wrap:nowrap; }
    .nav-links a { font-size:.75rem; letter-spacing:.06em; text-transform:uppercase; color:var(--white); text-decoration:none; font-weight:600; transition:color .2s; position:relative; }
    .nav-links a::after { content:""; position:absolute; bottom:-4px; left:0; width:0; height:1px; background:var(--gold); transition:width .3s; }
    .nav-links a:hover, .nav-links a.active { color:var(--gold); }
    .nav-links a:hover::after, .nav-links a.active::after { width:100%; }
    .nav-btn { background:var(--gold) !important; color:#000 !important; padding:7px 18px; font-weight:700; border-radius:2px; }
    .nav-btn:hover { background:var(--gold-light) !important; }
    .nav-btn::after { display:none !important; }
    .page-wrap { position:relative; z-index:1; padding:120px 48px 80px; max-width:1200px; margin:0 auto; }
    .section-label { font-size:.75rem; letter-spacing:.5em; text-transform:uppercase; color:var(--gold); opacity:.7; margin-bottom:10px; }
    .section-title { font-family:"Bebas Neue",sans-serif; font-size:clamp(2.5rem,5vw,4rem); letter-spacing:.08em; margin-bottom:8px; }
    .section-line { width:60px; height:2px; background:var(--gold); margin-bottom:40px; }
    footer { position:relative; z-index:1; text-align:center; padding:40px 24px; border-top:1px solid rgba(201,149,42,.1); margin-top:60px; }
    footer img { width:50px; opacity:.5; margin-bottom:10px; filter:drop-shadow(0 0 10px rgba(201,149,42,.4)); }
    footer p { font-size:.75rem; letter-spacing:.25em; text-transform:uppercase; opacity:.3; }
    @media(max-width:768px){ nav{padding:14px 20px;} .nav-links{display:none;} .page-wrap{padding:100px 20px 60px;} }

    .flyer-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,220px)); gap:24px; }
    .flyer-card { width:220px; height:300px; border:1px solid rgba(201,149,42,.3); position:relative; overflow:hidden; transition:transform .3s,box-shadow .3s; cursor:pointer; }
    .flyer-card:hover { transform:translateY(-6px); box-shadow:0 30px 60px rgba(0,0,0,.6); }
    .flyer-card::before { content:""; position:absolute; inset:0; background:linear-gradient(135deg,rgba(4,3,10,.9) 0%,rgba(59,0,204,.25) 50%,rgba(201,149,42,.15) 100%); }
    .flyer-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center; }
    .flyer-date { font-size:.78rem; letter-spacing:.4em; color:var(--gold); text-transform:uppercase; margin-bottom:20px; }
    .flyer-title { font-family:"Bebas Neue",sans-serif; font-size:2.8rem; letter-spacing:.1em; background:linear-gradient(135deg,var(--gold-light),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:12px; }
    .flyer-sub { font-size:.9rem; letter-spacing:.15em; opacity:.6; margin-bottom:24px; }
    .flyer-tag { font-size:.72rem; letter-spacing:.25em; text-transform:uppercase; color:var(--gold); border:1px solid rgba(201,149,42,.4); padding:6px 16px; }

    /* ── LANG SWITCHER ── */
    .lang-switcher { position:relative; margin-left:12px; }
    .lang-btn { background:rgba(201,149,42,.12); border:1px solid rgba(201,149,42,.3); color:var(--gold); font-family:"Rajdhani",sans-serif; font-size:.78rem; font-weight:700; letter-spacing:.1em; padding:6px 12px; cursor:pointer; transition:all .2s; white-space:nowrap; border-radius:2px; }
    .lang-btn:hover { background:rgba(201,149,42,.25); }
    .lang-menu { display:none !important; position:absolute; top:calc(100% + 8px); right:0; background:rgba(4,3,10,.98); border:1px solid rgba(201,149,42,.25); min-width:160px; z-index:9999; box-shadow:0 12px 40px rgba(0,0,0,.6); border-radius:2px; overflow:hidden; }
    .lang-menu.open { display:block !important; animation:fadeIn .15s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
    .lang-option { padding:9px 16px; font-size:.82rem; font-weight:600; letter-spacing:.08em; cursor:pointer; transition:background .15s; white-space:nowrap; }
    .lang-option:hover { background:rgba(201,149,42,.12); color:var(--gold); }
    .lang-option.active { color:var(--gold); background:rgba(201,149,42,.08); }

    /* ── FLYER GRID IMAGES ── */
    .flyer-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }
    .flyer-card:hover .flyer-thumb {
      transform: scale(1.05);
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99990;
      background: rgba(4,3,10,.92);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      cursor: none;
    }
    #lightbox.open {
      display: flex;
      animation: lbFadeIn .25s ease;
    }
    @keyframes lbFadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }
    #lightbox-img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border: 1px solid rgba(201,149,42,.4);
      box-shadow: 0 0 80px rgba(59,0,204,.4), 0 0 40px rgba(201,149,42,.2);
      animation: lbZoomIn .3s cubic-bezier(.22,1,.36,1);
    }
    @keyframes lbZoomIn {
      from { transform: scale(.88); opacity:0; }
      to   { transform: scale(1);   opacity:1; }
    }
    #lightbox-close {
      position: absolute;
      top: 24px;
      right: 32px;
      font-family: "Bebas Neue", sans-serif;
      font-size: 2rem;
      color: var(--gold);
      background: none;
      border: none;
      cursor: none;
      letter-spacing: .1em;
      opacity: .7;
      transition: opacity .2s;
    }
    #lightbox-close:hover { opacity: 1; }

  </style>
</head>

<script>
/* ── CURSOR ── */
const cursor=document.getElementById("cursor"),ring=document.getElementById("cursor-ring");
let mx=0,my=0,rx=0,ry=0;
document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+"px";cursor.style.top=my+"px";});
(function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+"px";ring.style.top=ry+"px";requestAnimationFrame(animRing);})();

/* ── CANVAS PARTICLES ── */
const canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d");
let W,H,particles=[];
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();window.addEventListener("resize",resize);
function Particle(){this.reset=function(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.8+.3;this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;this.life=Math.random();this.maxLife=.4+Math.random()*.6;this.color=Math.random()<.6?"201,149,42":"80,40,220";};this.reset();}
for(let i=0;i<150;i++){let p=new Particle();p.life=Math.random();particles.push(p);}
function draw(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.life+=.003;if(p.life>p.maxLife)p.reset();let alpha=Math.sin((p.life/p.maxLife)*Math.PI)*.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba("+p.color+","+alpha+")";ctx.fill();p.x+=p.vx;p.y+=p.vy;});for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){let dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle="rgba(201,149,42,"+(.15*(1-dist/100))+")";ctx.lineWidth=.4;ctx.stroke();}}requestAnimationFrame(draw);}
draw();
document.addEventListener("mousemove",e=>{particles.forEach(p=>{let dx=e.clientX-p.x,dy=e.clientY-p.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){p.vx-=dx/dist*.3;p.vy-=dy/dist*.3;}p.vx*=.97;p.vy*=.97;});});

/* ── ACTIVE NAV ── */
document.querySelectorAll(".nav-links a").forEach(a=>{if(a.href===location.href)a.classList.add("active");});

/* ── FADE IN ── */
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity="1";e.target.style.transform="translateY(0)";}});},{threshold:.1});
document.querySelectorAll(".fade-in").forEach(el=>{el.style.opacity="0";el.style.transform="translateY(28px)";el.style.transition="opacity .7s ease,transform .7s ease";obs.observe(el);});
</script>

<script>
/* ── LIGHTBOX ── */
const lightbox     = document.getElementById("lightbox");
const lightboxImg  = document.getElementById("lightbox-img");
const lightboxClose= document.getElementById("lightbox-close");

function openLightbox(src, alt) {
  lightboxImg.src = src;
  lightboxImg.alt = alt || "Flyer";
  lightbox.classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeLightbox() {
  lightbox.classList.remove("open");
  document.body.style.overflow = "";
  setTimeout(() => { lightboxImg.src = ""; }, 300);
}

lightboxClose.addEventListener("click", closeLightbox);
lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

/* ── LOAD FLYERS FROM GITHUB ── */
function loadFlayers() {
  const container = document.getElementById("flayerContainer");
  if (!container) return;

  container.innerHTML = '<p style="color:rgba(232,224,208,.4);letter-spacing:.2em;text-align:center;padding:40px 0;">Caricamento flyer...</p>';

  // ──────────────────────────────────────────────────────────────
  // CONFIG GITHUB
  // ──────────────────────────────────────────────────────────────
  // Crea una cartella nel repo: /flyers
  // Carica le immagini con nome formato: YYYY-MM-DD_EVENTO_Nome.jpg
  // Esempio: 2026-03-18_SUMMER_Festa Estiva.jpg
  
  const GITHUB_USER = "blackpantherclub";        // ← Configurato
  const GITHUB_REPO = "blackpantherclub";        // ← Configurato
  const GITHUB_FOLDER = "flyers";                // Cartella dove sono le immagini
  const GITHUB_BRANCH = "main";                  // Branch (main/master)

  const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FOLDER}?ref=${GITHUB_BRANCH}`;

  fetchFlayersFromGitHub(API_URL, container);
}

function fetchFlayersFromGitHub(apiUrl, container) {
  fetch(apiUrl)
    .then(res => {
      if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
      return res.json();
    })
    .then(data => {
      if (!Array.isArray(data)) {
        throw new Error("Cartella GitHub non trovata");
      }

      // Filtra solo immagini (PNG, JPG, JPEG, GIF, WEBP)
      const imageFiles = data.filter(file => 
        /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name)
      );

      // Parsing del nome file: YYYY-MM-DD_EVENTO_Nome.{png|jpg|jpeg}
      const flayers = imageFiles.map(file => {
        // Accetta formato: YYYY-MM-DD_EVENTO_Nome.png oppure YYYY-MM-DD_EVENTO_Nome.jpg
        const match = file.name.match(/^(\d{4}-\d{2}-\d{2})_([A-Z0-9_-]+)_(.+?)\.(jpg|jpeg|png|gif|webp)$/i);
        
        if (match) {
          const [, dateStr, evento, nome] = match;
          return {
            url: file.download_url,
            name: nome,
            evento: evento,
            date: new Date(dateStr),
            dateStr: dateStr
          };
        }
        
        // Fallback se il nome non rispetta il formato
        return {
          url: file.download_url,
          name: file.name.replace(/\.\w+$/, ''),
          evento: "VARIO",
          date: new Date(0),
          dateStr: "0000-00-00"
        };
      });

      // Ordina per data (più recenti prima)
      flayers.sort((a, b) => b.date - a.date);

      // Raggruppa per evento
      const flayersByEvent = {};
      flayers.forEach(f => {
        if (!flayersByEvent[f.evento]) {
          flayersByEvent[f.evento] = [];
        }
        flayersByEvent[f.evento].push(f);
      });

      // Ordina eventi per data più recente
      const sortedEvents = Object.keys(flayersByEvent).sort((a, b) => {
        const dateA = Math.max(...flayersByEvent[a].map(f => f.date));
        const dateB = Math.max(...flayersByEvent[b].map(f => f.date));
        return dateB - dateA;
      });

      renderFlayersByEvent(flayersByEvent, sortedEvents, container);
    })
    .catch(err => {
      console.error("Errore caricamento flyer:", err);
      container.innerHTML = `<p style="color:rgba(200,100,100,.6);letter-spacing:.2em;text-align:center;padding:40px 0;">Errore: ${err.message}</p>`;
    });
}

function renderFlayersByEvent(flayersByEvent, sortedEvents, container) {
  container.innerHTML = "";

  if (sortedEvents.length === 0) {
    container.innerHTML = '<p style="color:rgba(232,224,208,.4);letter-spacing:.2em;text-align:center;padding:40px 0;">Nessun flyer disponibile</p>';
    return;
  }

  sortedEvents.forEach(evento => {
    const eventFlayers = flayersByEvent[evento];
    
    // Sezione evento
    const eventSection = document.createElement("div");
    eventSection.style.marginBottom = "60px";
    
    // Titolo evento
    const eventTitle = document.createElement("h2");
    eventTitle.className = "fade-in";
    eventTitle.style.cssText = `
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.8rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(201,149,42,.3);
    `;
    eventTitle.textContent = evento;
    eventSection.appendChild(eventTitle);
    
    // Griglia flayer per questo evento
    const grid = document.createElement("div");
    grid.className = "flyer-grid";
    
    // Ordina per data decrescente (più recenti prima)
    eventFlayers.sort((a, b) => b.date - a.date);
    
    eventFlayers.forEach(item => {
      const card = document.createElement("div");
      card.className = "flyer-card fade-in";

      const img = document.createElement("img");
      img.src = item.url;
      img.alt = item.name;
      img.className = "flyer-thumb";

      card.appendChild(img);
      
      // Tooltip con data
      card.title = `${item.dateStr} - ${item.name}`;
      
      card.addEventListener("click", () => openLightbox(item.url, item.name));
      grid.appendChild(card);
    });
    
    eventSection.appendChild(grid);
    container.appendChild(eventSection);
  });

  // Re-apply intersection observer per fade-in
  obs.disconnect();
  document.querySelectorAll(".fade-in").forEach(el=>{
    if(!el.style.opacity || el.style.opacity === "0") {
      el.style.opacity="0";
      el.style.transform="translateY(28px)";
      el.style.transition="opacity .7s ease,transform .7s ease";
      obs.observe(el);
    }
  });
}

document.addEventListener("DOMContentLoaded", loadFlayers);
</script>
