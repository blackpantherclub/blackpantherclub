<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flayer &mdash; BLACK PANTHER CLUB</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>

    :root { --deep:#04030a; --gold:#c9952a; --gold-light:#f0c060; --blue-glow:#3b00cc; --white:#e8e8f0; --panel:rgba(8,5,20,0.88); }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--deep); color:var(--white); font-family:"Rajdhani",sans-serif; overflow-x:hidden; cursor:none; min-height:100vh; }
    #cursor { position:fixed; width:12px; height:12px; background:var(--gold); border-radius:50%; pointer-events:none; z-index:99999; transform:translate(-50%,-50%); mix-blend-mode:difference; }
    #cursor-ring { position:fixed; width:34px; height:34px; border:1.5px solid rgba(201,149,42,.7); border-radius:50%; pointer-events:none; z-index:99998; transform:translate(-50%,-50%); transition:all .1s ease; }
    #canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
    nav { position:fixed; top:0; width:100%; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:16px 48px; background:linear-gradient(to bottom,rgba(4,3,10,.97) 80%,transparent); border-bottom:1px solid rgba(201,149,42,.15); }
    .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .nav-logo img { width:44px; height:44px; object-fit:contain; filter:drop-shadow(0 0 10px rgba(201,149,42,.6)); }
    .nav-logo-text { font-family:"Bebas Neue",sans-serif; font-size:1.6rem; letter-spacing:.2em; color:var(--gold); text-shadow:0 0 20px rgba(201,149,42,.5); }
    .nav-links { display:flex; gap:14px; list-style:none; }
    .nav-links a { font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:var(--white); text-decoration:none; font-weight:600; transition:color .2s; position:relative; }
    .nav-links a::after { content:""; position:absolute; bottom:-4px; left:0; width:0; height:1px; background:var(--gold); transition:width .3s; }
    .nav-links a:hover, .nav-links a.active { color:var(--gold); }
    .nav-links a:hover::after, .nav-links a.active::after { width:100%; }
    .nav-btn { background:var(--gold) !important; color:#000 !important; padding:7px 18px; font-weight:700; border-radius:2px; }
    .nav-btn:hover { background:var(--gold-light) !important; }
    .nav-btn::after { display:none !important; }
    .page-wrap { position:relative; z-index:1; padding:120px 48px 80px; max-width:1200px; margin:0 auto; }
    .section-label { font-size:.75rem; letter-spacing:.5em; text-transform:uppercase; color:var(--gold); opacity:.7; margin-bottom:10px; }
    .section-title { font-family:"Bebas Neue",sans-serif; font-size:clamp(2.5rem,5vw,4rem); letter-spacing:.08em; margin-bottom:8px; }
    .section-line { width:60px; height:2px; background:var(--gold); margin-bottom:40px; }
    footer { position:relative; z-index:1; text-align:center; padding:40px 24px; border-top:1px solid rgba(201,149,42,.1); margin-top:60px; }
    footer img { width:50px; opacity:.5; margin-bottom:10px; filter:drop-shadow(0 0 10px rgba(201,149,42,.4)); }
    footer p { font-size:.75rem; letter-spacing:.25em; text-transform:uppercase; opacity:.3; }
    @media(max-width:768px){ nav{padding:14px 20px;} .nav-links{display:none;} .page-wrap{padding:100px 20px 60px;} }


    .flyer-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:28px; }
    .flyer-card { aspect-ratio:3/4; border:1px solid rgba(201,149,42,.3); position:relative; overflow:hidden; transition:transform .3s,box-shadow .3s; cursor:pointer; }
    .flyer-card:hover { transform:translateY(-6px); box-shadow:0 30px 60px rgba(0,0,0,.6); }
    .flyer-card::before { content:""; position:absolute; inset:0; background:linear-gradient(135deg,rgba(4,3,10,.9) 0%,rgba(59,0,204,.25) 50%,rgba(201,149,42,.15) 100%); }
    .flyer-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center; }
    .flyer-date { font-size:.78rem; letter-spacing:.4em; color:var(--gold); text-transform:uppercase; margin-bottom:20px; }
    .flyer-title { font-family:"Bebas Neue",sans-serif; font-size:2.8rem; letter-spacing:.1em; background:linear-gradient(135deg,var(--gold-light),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:12px; }
    .flyer-sub { font-size:.9rem; letter-spacing:.15em; opacity:.6; margin-bottom:24px; }
    .flyer-tag { font-size:.72rem; letter-spacing:.25em; text-transform:uppercase; color:var(--gold); border:1px solid rgba(201,149,42,.4); padding:6px 16px; }


    /* ── LANG SWITCHER ── */
    .lang-switcher { position:relative; margin-left:12px; }
    .lang-btn { background:rgba(201,149,42,.12); border:1px solid rgba(201,149,42,.3); color:var(--gold); font-family:"Rajdhani",sans-serif; font-size:.78rem; font-weight:700; letter-spacing:.1em; padding:6px 12px; cursor:none; transition:all .2s; white-space:nowrap; }
    .lang-btn:hover { background:rgba(201,149,42,.22); }
    .lang-dropdown { display:none; position:absolute; top:calc(100% + 6px); right:0; background:rgba(8,5,20,.97); border:1px solid rgba(201,149,42,.3); min-width:100%; z-index:2000; }
    .lang-dropdown.open { display:block; }
    .lang-option { display:block; width:100%; padding:7px 14px; font-family:"Rajdhani",sans-serif; font-size:.78rem; font-weight:600; letter-spacing:.08em; color:var(--white); background:none; border:none; text-align:left; cursor:none; transition:background .15s,color .15s; }
    .lang-option:hover, .lang-option.active { background:rgba(201,149,42,.15); color:var(--gold); }

  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="canvas"></canvas>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="BPC Logo">
    <span class="nav-logo-text">Black Panther</span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html" data-i18n="nav_home">Home</a></li>
    <li><a href="events.html" data-i18n="nav_events">Events</a></li>
    <li><a href="flayer.html" class="active" data-i18n="nav_flayer">Flyer</a></li>
    <li><a href="gallery.html" data-i18n="nav_gallery">Gallery</a></li>
    <li><a href="about.html" data-i18n="nav_about">About</a></li>
    <li><a href="admin.html" class="nav-btn" data-i18n="nav_admin">Admin</a></li>
  </ul>
  <div class="lang-switcher">
    <button class="lang-btn" id="langToggle">🌐 IT ▾</button>
    <div class="lang-dropdown" id="langDropdown">
      <button class="lang-option" data-lang="it">🇮🇹 Italiano</button>
      <button class="lang-option" data-lang="en">🇬🇧 English</button>
      <button class="lang-option" data-lang="de">🇩🇪 Deutsch</button>
      <button class="lang-option" data-lang="fr">🇫🇷 Français</button>
      <button class="lang-option" data-lang="es">🇪🇸 Español</button>
      <button class="lang-option" data-lang="pt">🇵🇹 Português</button>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <p class="section-label" data-i18n="flayer_label">Archivio</p>
  <h1 class="section-title" data-i18n="flayer_title">Flyer</h1>
  <div class="section-line"></div>

  <!-- ✅ FIX: flayerContainer is now inside .page-wrap -->
  <div id="flayerContainer" class="flyer-grid"></div>
</div>

<footer>
  <img src="logo.png" alt="BPC">
  <p>&copy; 2026 Black Panther Club &middot; All Rights Reserved &middot; 3DX Virtual World</p>
</footer>

<script>
const cursor=document.getElementById("cursor"),ring=document.getElementById("cursor-ring");
let mx=0,my=0,rx=0,ry=0;
document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+"px";cursor.style.top=my+"px";});
(function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+"px";ring.style.top=ry+"px";requestAnimationFrame(animRing);})();
const canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d");
let W,H,particles=[];
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize();window.addEventListener("resize",resize);
function Particle(){this.reset=function(){this.x=Math.random()*W;this.y=Math.random()*H;this.r=Math.random()*1.8+.3;this.vx=(Math.random()-.5)*.4;this.vy=(Math.random()-.5)*.4;this.life=Math.random();this.maxLife=.4+Math.random()*.6;this.color=Math.random()<.6?"201,149,42":"80,40,220";};this.reset();}
for(let i=0;i<150;i++){let p=new Particle();p.life=Math.random();particles.push(p);}
function draw(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.life+=.003;if(p.life>p.maxLife)p.reset();let alpha=Math.sin((p.life/p.maxLife)*Math.PI)*.5;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba("+p.color+","+alpha+")";ctx.fill();p.x+=p.vx;p.y+=p.vy;});for(let i=0;i<particles.length;i++)for(let j=i+1;j<particles.length;j++){let dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<100){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle="rgba(201,149,42,"+(.15*(1-dist/100))+")";ctx.lineWidth=.4;ctx.stroke();}}requestAnimationFrame(draw);}
draw();
document.addEventListener("mousemove",e=>{particles.forEach(p=>{let dx=e.clientX-p.x,dy=e.clientY-p.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){p.vx-=dx/dist*.3;p.vy-=dy/dist*.3;}p.vx*=.97;p.vy*=.97;});});
// Active nav link
document.querySelectorAll(".nav-links a").forEach(a=>{if(a.href===location.href)a.classList.add("active");});
// Fade in
const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity="1";e.target.style.transform="translateY(0)";}});},{threshold:.1});
document.querySelectorAll(".fade-in").forEach(el=>{el.style.opacity="0";el.style.transform="translateY(28px)";el.style.transition="opacity .7s ease,transform .7s ease";obs.observe(el);});
</script>

<script src="lang.js"></script>

<script>
function loadFlayers(){
 const container=document.getElementById("flayerContainer");
 if(!container) return;
 const flayers=JSON.parse(localStorage.getItem("bpc_flayer")||"[]");
 container.innerHTML="";
 if(flayers.length===0){
   container.innerHTML='<p style="color:rgba(232,224,208,.4);letter-spacing:.2em;text-align:center;padding:40px 0;">Nessun flyer disponibile</p>';
   return;
 }
 flayers.forEach(item=>{
   const src = typeof item === "string" ? item : item.url;
   const img=document.createElement("img");
   img.src=src;
   img.alt=typeof item === "object" && item.name ? item.name : "Flyer";
   img.style.maxWidth="300px";
   img.style.margin="10px";
   img.style.borderRadius="10px";
   container.appendChild(img);
 });
}
document.addEventListener("DOMContentLoaded",loadFlayers);
</script>

</body>
</html>
