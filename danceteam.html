<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dance Team Groups - Black Panther Club</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep: #04030a;
      --gold: #c9952a;
      --gold-light: #f0c060;
      --white: #e8e8f0;
      --panel: rgba(8,5,20,0.88);
      --border: #2a2040;
      --violet: #3b00cc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--deep);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }
    #canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    main { position: relative; z-index: 1; padding-top: 80px; }
    .hero {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }
    .hero h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: 1rem;
      color: rgba(232,232,240,0.7);
      letter-spacing: 2px;
    }
    .section {
      padding: 80px 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.5rem;
      letter-spacing: 4px;
      color: var(--gold);
      margin-bottom: 50px;
      text-align: center;
    }
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 30px;
    }
    .group-card {
      border: 1px solid rgba(201,149,42,0.2);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      max-width: 180px;
      margin: 0 auto;
    }
    .group-card:hover {
      border-color: rgba(201,149,42,0.6);
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(201,149,42,0.2);
    }
    .group-image {
      width: 180px;
      height: 180px;
      background: linear-gradient(135deg, rgba(59,0,204,0.1) 0%, rgba(0,0,0,0.3) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .group-image img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(201,149,42,0.3));
    }
    .group-info {
      padding: 15px;
      text-align: center;
      background: linear-gradient(180deg, rgba(8,5,20,0.6) 0%, rgba(4,3,10,0.9) 100%);
    }
    .group-name {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.2rem;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .group-subtitle {
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: rgba(232,232,240,0.6);
      text-transform: uppercase;
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: rgba(232,232,240,0.4);
    }
    .empty-icon { font-size: 48px; margin-bottom: 15px; }
    .loading { opacity: 0.6; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    footer {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 40px 20px;
      text-align: center;
      color: rgba(232,232,240,0.6);
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <nav style="position:fixed; top:0; width:100%; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:16px 48px; background:linear-gradient(to bottom,rgba(4,3,10,.97) 80%,transparent); border-bottom:1px solid rgba(201,149,42,.15);">
    <a href="index.html" style="display:flex; align-items:center; gap:12px; text-decoration:none;">
      <img src="favicon.png" alt="BPC" style="width:44px; height:44px; object-fit:contain; filter:drop-shadow(0 0 10px rgba(201,149,42,.6));">
      <span style="font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.2em; color:var(--gold); text-shadow:0 0 20px rgba(201,149,42,.5);">BLACK PANTHER</span>
    </a>
    <ul style="display:flex; gap:14px; list-style:none;">
      <li><a href="index.html" style="font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:var(--white); text-decoration:none; font-weight:600; transition:color .2s;">Home</a></li>
      <li><a href="calendario.html" style="font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:var(--white); text-decoration:none; font-weight:600; transition:color .2s;">Calendario</a></li>
      <li><a href="gallery.html" style="font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:var(--white); text-decoration:none; font-weight:600; transition:color .2s;">Gallery</a></li>
      <li><a href="djs.html" style="font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:var(--white); text-decoration:none; font-weight:600; transition:color .2s;">DJ</a></li>
      <li><a href="danceteam.html" style="font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); text-decoration:none; font-weight:600; border-bottom:2px solid var(--gold); padding-bottom:12px;">Dance Team</a></li>
      <li><a href="flayer.html" style="font-size:.85rem; letter-spacing:.12em; text-transform:uppercase; color:var(--white); text-decoration:none; font-weight:600; transition:color .2s;">Flayer</a></li>
      <li><a href="admin.html" title="Admin" style="font-size:.85rem; letter-spacing:.12em; color:var(--white); text-decoration:none;">⚙</a></li>
    </ul>
  </nav>

  <main>
    <section class="hero">
      <div>
        <h1>DANCE TEAM GROUPS</h1>
        <p>Black Panther Club</p>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Our Groups</h2>
      <div class="groups-grid" id="groupsContainer" class="loading">
        <div class="empty-state">
          <div class="empty-icon">⏳</div>
          <div>Caricamento gruppi...</div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Black Panther Club &middot; All Rights Reserved</p>
  </footer>

  <!-- FIREBASE SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

  <script>
    // ========== CONFIGURAZIONE FIREBASE ==========
    const firebaseConfig = {
      apiKey: "AIzaSyA8WyXwKnZHBpIoQfgWSGf7WgtivhoJEDk",
      authDomain: "black-panther-ced90.firebaseapp.com",
      databaseURL: "https://black-panther-ced90-default-rtdb.europe-west1.firebaseio.com",
      projectId: "black-panther-ced90",
      storageBucket: "black-panther-ced90.firebasestorage.app",
      messagingSenderId: "107530122233336",
      appId: "1:107530122233336:web:09d39bf6a6f9784545ea25",
      measurementId: "G-LY0QPYOVPW"
    };

    // Inizializza Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ========== CARICA I GRUPPI DA FIREBASE ==========
    function loadGroups() {
      const container = document.getElementById('groupsContainer');

      db.ref('danceGroups').on('value', (snapshot) => {
        const groups = snapshot.val();
        container.classList.remove('loading');

        if (!groups || Object.keys(groups).length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">👥</div>
              <div>Nessun gruppo ancora creato...</div>
            </div>
          `;
          return;
        }

        container.innerHTML = Object.values(groups).map(g => `
          <div class="group-card">
            <div class="group-image">
              ${g.logo ? `<img src="${g.logo}" alt="${g.name}">` : ''}
            </div>
            <div class="group-info">
              <h3 class="group-name">${g.name}</h3>
              <p class="group-subtitle">${g.subtitle || ''}</p>
            </div>
          </div>
        `).join('');
      });
    }

    // Carica i gruppi all'apertura della pagina
    loadGroups();

    // ========== BACKGROUND PARTICLES ==========
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W = canvas.width = innerWidth;
    let H = canvas.height = innerHeight;
    let particles = [];

    class Particle {
      constructor() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.r = Math.random() * 1.8 + 0.3;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.life = Math.random();
        this.maxLife = 0.4 + Math.random() * 0.6;
        this.color = Math.random() < 0.6 ? '201,149,42' : '80,40,220';
      }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.life = 0;
      }
    }

    for (let i = 0; i < 150; i++) {
      let p = new Particle();
      p.life = Math.random();
      particles.push(p);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      particles.forEach(p => {
        p.life += 0.003;
        if (p.life > p.maxLife) p.reset();
        let alpha = Math.sin((p.life / p.maxLife) * Math.PI) * 0.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + p.color + ',' + alpha + ')';
        ctx.fill();
        p.x += p.vx;
        p.y += p.vy;
      });
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          let dx = particles[i].x - particles[j].x;
          let dy = particles[i].y - particles[j].y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = 'rgba(201,149,42,' + (0.15 * (1 - dist / 100)) + ')';
            ctx.lineWidth = 0.4;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();

    window.addEventListener('resize', () => {
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
    });
  </script>
</body>
</html>
